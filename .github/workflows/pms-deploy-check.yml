name: PMS deploy readiness

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check all tracked Python files
        run: |
          git ls-files -z '*.py' | xargs -0 -r python -m py_compile

      - name: Check frontend syntax
        run: node --check static/pms_app.js

  trigger-render-hook:
    needs: syntax-check
    runs-on: ubuntu-latest
    if: ${{ vars.RENDER_DEPLOY_HOOK_ENABLED == 'true' }}
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
