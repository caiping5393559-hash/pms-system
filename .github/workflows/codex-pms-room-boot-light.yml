name: Codex PMS room boot patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-pms-room-boot-light.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply PMS boot patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding='utf-8')
                  return
              if new in text:
                  return
              raise SystemExit(f'{label} hook not found')

          app = Path('app.py')
          replace_once(
              app,
              'PMS_PATCH_VERSION = "2026-06-23-direct-ical-sync-v1"',
              'PMS_PATCH_VERSION = "2026-06-23-room-boot-light-v1"',
              'app version',
          )

          ui = Path('pms_ui_patch.js')
          replace_once(
              ui,
              "window.__PMS_PATCH_VERSION='2026-06-23-direct-ical-sync-v1';",
              "window.__PMS_PATCH_VERSION='2026-06-23-room-boot-light-v1';",
              'ui version',
          )

          old_boot = """  function boot(){install();if(document.getElementById('owner')){renderCleaner();renderOwner();if(!props().length&&typeof window.loadState==='function')window.loadState().then(()=>{if(!Array.isArray(S.ownerPropertyIds)||!S.ownerPropertyIds.length)saveOwnerPropIds(validPropIds());renderCleaner();renderOwner();}).catch(()=>{});}else if(document.getElementById('roomSettings'))renderRoomSettings();}
  boot();
  setTimeout(boot,0);
  setTimeout(boot,80);
  setTimeout(boot,500);
  setTimeout(boot,1500);
  setTimeout(boot,3000);"""
          new_boot = """  function boot(){install();const owner=document.getElementById('owner');if(owner){if(!props().length&&typeof window.loadState==='function'&&!S.bootLoadStarted){S.bootLoadStarted=true;window.loadState().then(()=>{if(!Array.isArray(S.ownerPropertyIds)||!S.ownerPropertyIds.length)saveOwnerPropIds(validPropIds());renderCleaner();renderOwner();S.bootRendered=true;}).catch(()=>{});return;}if(!S.bootRendered){renderCleaner();renderOwner();S.bootRendered=true;}}else if(document.getElementById('roomSettings')&&!S.bootRendered){renderRoomSettings();S.bootRendered=true;}}
  function bootFallback(){install();if(!S.bootRendered)boot();}
  boot();
  setTimeout(bootFallback,120);"""
          replace_once(ui, old_boot, new_boot, 'boot block')

          workflow = Path('.github/workflows/codex-pms-room-boot-light.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Validate patched files
        run: |
          python -m py_compile app.py
          node --check pms_ui_patch.js
      - name: Commit patch
        run: |
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add app.py pms_ui_patch.js .github/workflows/codex-pms-room-boot-light.yml
          git commit -m "Reduce PMS owner boot rerenders"
          git push

