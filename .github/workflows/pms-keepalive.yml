name: PMS scheduled iCal sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-ical-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake PMS and queue iCal sync
        run: curl --fail --silent --show-error --max-time 45 https://pms-system-708g.onrender.com/api/cron/ical-sync
