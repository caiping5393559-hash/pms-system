<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMS</title>
<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --text:#182230;
  --muted:#667085;
  --line:#d9e1ec;
  --primary:#0f766e;
  --shadow:0 8px 22px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
}
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:14px 18px;
}
.header-inner{
  max-width:1280px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}
h1{font-size:22px;margin:0}
h2{font-size:20px;margin:0 0 8px}
.small{font-size:13px;color:var(--muted)}
.nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,.smallbtn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  padding:9px 12px;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}
button.active,.smallbtn.primary{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
main{max-width:1280px;margin:18px auto 60px;padding:0 14px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.section,.tab-content{display:none}
.section.active,.tab-content.active{display:block}
</style>
</head>
<body data-pms-app-shell="1">
<header>
  <div class="header-inner">
    <div>
      <h1>PMS</h1>
      <div class="small">正在加载系统...</div>
    </div>
    <div class="nav">
      <button type="button" class="active" onclick="showSection('cleaner', this)">保洁页面</button>
      <button type="button" onclick="showSection('owner', this)">房东管理</button>
    </div>
  </div>
</header>
<main>
  <section id="owner" class="section"></section>
  <section id="cleaner" class="section active"></section>
  <div class="card" id="pmsInitialLoading">
    <h2>正在加载 PMS</h2>
    <div class="small">系统会在数据读取完成后显示页面，不先渲染空数据。</div>
  </div>
</main>
<script src="/pms_app.js?v=2026-07-06-v77-mail-income-finance" defer></script>
</body>
</html>
